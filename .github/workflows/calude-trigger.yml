name: Claude Issue Trigger

# 1. 트리거 설정: 이슈에 라벨이 달렸을 때 실행
on:
  issues:
    types: [labeled]

jobs:
  check-label:
    # 2. 'claude-bot'이라는 라벨이 붙었을 때만 이 작업이 실행됨
    if: github.event.label.name == 'claude-driven-coding'
    runs-on: ubuntu-latest
    
    steps:
      - name: 이슈 내용 확인
        run: |
          echo "이슈 번호: ${{ github.event.issue.number }}"
          echo "이슈 제목: ${{ github.event.issue.title }}"
          echo "이슈 내용: ${{ github.event.issue.body }}"
          
      - name: 작업 시작 알림 댓글 달기
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 Claude가 이슈 분석을 시작했습니다! 잠시만 기다려주세요.'
            })